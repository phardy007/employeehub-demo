<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OK Traffic Control — EmployeeHub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--navy:#1e3a5f;--blue:#2c5282;--light-blue:#4a90e2;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--bg:#f0f4f8;--white:#fff;--border:#e2e8f0;--text:#1a1a1a;--muted:#64748b;--light:#f8fafc;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:linear-gradient(160deg,var(--navy),var(--blue));}
.login-logo{width:80px;height:80px;background:white;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1rem;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.login-title{color:white;font-size:1.5rem;font-weight:700;margin-bottom:0.25rem;}
.login-sub{color:rgba(255,255,255,0.7);font-size:0.875rem;margin-bottom:2rem;}
.login-card{background:white;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:1.5rem;gap:4px;}
.login-tab{flex:1;padding:0.6rem;border:none;background:none;border-radius:8px;font-size:0.875rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.login-tab.active{background:white;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.75rem;border:2px solid var(--border);border-radius:10px;font-size:0.95rem;transition:border-color 0.2s;background:white;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
.btn{width:100%;padding:0.875rem;border:none;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:white;}
.btn-primary:hover:not(:disabled){background:var(--navy);}
.btn-sm{width:auto;padding:0.45rem 0.9rem;font-size:0.8rem;border-radius:8px;}
.btn-success{background:var(--green);color:white;}
.btn-danger{background:var(--red);color:white;}
.btn-amber{background:var(--amber);color:white;}
.btn-secondary{background:var(--border);color:var(--text);}

/* APP */
#appShell{display:none;flex-direction:column;min-height:100vh;}
.top-bar{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;padding:0.875rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.top-bar-left{display:flex;align-items:center;gap:0.75rem;}
.top-bar-logo{width:36px;height:36px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.top-bar-title{font-size:1rem;font-weight:700;line-height:1.2;}
.top-bar-sub{font-size:0.7rem;opacity:0.75;}
.top-bar-right{display:flex;align-items:center;gap:0.75rem;}
.role-pill{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);padding:0.3rem 0.75rem;border-radius:20px;font-size:0.75rem;font-weight:700;cursor:pointer;}
.notif-btn{position:relative;background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;}
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1px solid var(--navy);display:none;}
.main-content{flex:1;padding:1rem;max-width:700px;margin:0 auto;width:100%;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.6rem 0.25rem;border:none;background:none;cursor:pointer;color:var(--muted);transition:color 0.2s;position:relative;}
.nav-item.active{color:var(--blue);}
.nav-icon{font-size:1.3rem;line-height:1;}
.nav-label{font-size:0.62rem;font-weight:600;margin-top:0.2rem;}
.nav-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--red);color:white;font-size:0.6rem;font-weight:700;border-radius:10px;padding:0.1rem 0.35rem;}

/* CARDS */
.card{background:white;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.07);border:1px solid var(--border);}
.card-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;margin-bottom:1rem;}
.stat-box{background:var(--light);border-radius:12px;padding:1rem;text-align:center;}
.stat-num{font-size:1.75rem;font-weight:800;color:var(--blue);}
.stat-lbl{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:0.2rem;}

/* CLOCK */
.clock-card{background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:16px;padding:1.5rem;color:white;text-align:center;margin-bottom:1rem;}
.clock-time{font-size:2.5rem;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.clock-date{font-size:0.85rem;opacity:0.8;margin-bottom:1.25rem;}
.clock-status{display:inline-block;padding:0.35rem 1rem;border-radius:20px;font-size:0.8rem;font-weight:700;margin-bottom:1.25rem;}
.clocked-in{background:rgba(16,185,129,0.3);border:1px solid rgba(16,185,129,0.6);}
.clocked-out{background:rgba(239,68,68,0.3);border:1px solid rgba(239,68,68,0.6);}
.clock-btn{padding:1rem 2rem;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%;}
.btn-clock-in{background:var(--green);color:white;}
.btn-clock-out{background:var(--red);color:white;}
.gps-indicator{font-size:0.75rem;opacity:0.8;margin-top:0.75rem;display:flex;align-items:center;justify-content:center;gap:0.4rem;}
.gps-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.3);}}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:0.25rem 0.65rem;border-radius:12px;font-size:0.72rem;font-weight:700;}
.badge-green{background:#d1fae5;color:#065f46;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-amber{background:#fef3c7;color:#92400e;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.badge-gray{background:#f1f5f9;color:#475569;}

/* LIST */
.list-item{display:flex;align-items:center;gap:0.875rem;padding:0.875rem 0;border-bottom:1px solid var(--border);}
.list-item:last-child{border-bottom:none;}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--light-blue));color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;}
.avatar-sm{width:32px;height:32px;font-size:0.75rem;}
.list-info{flex:1;min-width:0;}
.list-name{font-weight:600;font-size:0.9rem;}
.list-sub{font-size:0.75rem;color:var(--muted);margin-top:0.1rem;}
.list-right{text-align:right;flex-shrink:0;}

/* GPS MAP */
.mini-map{background:#e8f4f8;border:2px solid #93c5fd;border-radius:12px;height:220px;position:relative;overflow:hidden;margin-bottom:0.75rem;}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(100,149,237,0.12) 1px,transparent 1px),linear-gradient(90deg,rgba(100,149,237,0.12) 1px,transparent 1px);background-size:30px 30px;}
.trail-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);transform:translate(-50%,-50%);}
.trail-dot.current{background:var(--green);width:14px;height:14px;animation:pulse 2s infinite;}
.trail-line{position:absolute;background:rgba(44,82,130,0.4);height:2px;transform-origin:left center;}
.map-overlay{position:absolute;top:8px;left:8px;background:rgba(255,255,255,0.92);border-radius:8px;padding:0.35rem 0.6rem;font-size:0.72rem;font-weight:700;color:var(--navy);}

/* CHAT */
.chat-item{display:flex;align-items:center;gap:0.75rem;padding:0.875rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.chat-item:hover{background:#eff6ff;}
.chat-back{display:flex;align-items:center;gap:0.5rem;padding:0.75rem 0;font-weight:700;color:var(--blue);cursor:pointer;border:none;background:none;font-size:0.9rem;}
.msg-bubble{max-width:78%;padding:0.6rem 0.875rem;border-radius:14px;font-size:0.875rem;line-height:1.5;}
.msg-out{background:var(--blue);color:white;align-self:flex-end;border-bottom-right-radius:4px;}
.msg-in{background:#f1f5f9;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.msg-time{font-size:0.65rem;opacity:0.6;margin-top:0.2rem;}
.msg-input-row{display:flex;gap:0.5rem;padding:0.75rem 0 0.5rem;}
.msg-input-row input{flex:1;padding:0.75rem;border:2px solid var(--border);border-radius:24px;font-size:0.9rem;}
.msg-input-row input:focus{outline:none;border-color:var(--blue);}
.msg-send{width:44px;height:44px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ANNOUNCEMENTS */
.ann{border-radius:12px;padding:1rem 1.1rem;margin-bottom:0.75rem;border-left:4px solid;}
.ann-info{background:#eff6ff;border-color:#3b82f6;}
.ann-warn{background:#fffbeb;border-color:var(--amber);}
.ann-success{background:#f0fdf4;border-color:var(--green);}
.ann-title{font-weight:700;font-size:0.9rem;}
.ann-body{font-size:0.83rem;color:#475569;margin-top:0.25rem;line-height:1.5;}
.ann-meta{font-size:0.72rem;color:#94a3b8;margin-top:0.4rem;}

/* CERT */
.cert-item{padding:0.875rem 0;border-bottom:1px solid var(--border);}
.cert-item:last-child{border:none;}
.cert-bar-bg{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:0.4rem;}
.cert-bar-fill{height:100%;border-radius:3px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 1.25rem;}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:0.75rem;margin-top:1.25rem;}
.modal-actions .btn{flex:1;}

.alert-bar{background:#fffbeb;border:1px solid var(--amber);border-radius:10px;padding:0.75rem 1rem;font-size:0.83rem;color:#92400e;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.scroll-table{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
th{background:#f8fafc;padding:0.75rem 0.6rem;text-align:left;font-weight:700;color:var(--muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.4px;border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:0.75rem 0.6rem;border-bottom:1px solid #f8fafc;vertical-align:middle;}
.pb-nav{padding-bottom:80px;}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:2rem;color:var(--muted);font-size:0.9rem;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">🚧</div>
  <div class="login-title">OK Traffic Control</div>
  <div class="login-sub">EmployeeHub Pro</div>
  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" onclick="setLoginRole('employee')">Employee</button>
      <button class="login-tab" onclick="setLoginRole('admin')">Admin / Office</button>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div id="loginError" style="color:var(--red);font-size:0.8rem;margin-top:0.75rem;text-align:center;"></div>
    <p style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:1rem;">
      First time? Ask your office manager to create your account.
    </p>
  </div>
</div>

<div id="appShell">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">🚧</div>
      <div>
        <div class="top-bar-title">OK Traffic Control</div>
        <div class="top-bar-sub" id="topBarSub">EmployeeHub Pro</div>
      </div>
    </div>
    <div class="top-bar-right">
      <div class="role-pill" onclick="switchRole()" id="rolePill">👷 Employee</div>
      <button class="notif-btn" onclick="showSection('alerts')">🔔<span class="notif-dot" id="notifDot"></span></button>
      <button class="notif-btn" onclick="doSignOut()" title="Sign out">🚪</button>
    </div>
  </div>
  <div class="main-content pb-nav" id="mainContent"><div class="loading">Loading...</div></div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ── SUPABASE INIT ──────────────────────────────────────────────
const SUPABASE_URL = 'https://bwrbbwdztgcxwfcxqyzo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fXTqHg3-PZGeySPBB710VA_GcOdaRtg';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──────────────────────────────────────────────────────
let currentRole = 'employee';
let loginRole   = 'employee';
let currentUser = null;
let currentEmp  = null;
let isClockedIn = false;
let clockInTime = null;
let activeTimeEntryId = null;
let gpsTrail    = [];
let gpsInterval = null;
let clockTimer  = null;
let activeChat  = null;
let allEmployees = [];

// ── UTILS ──────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const fmtTime = d => d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const fmtDate = d => d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
const daysUntil = d => Math.ceil((new Date(d) - new Date()) / 86400000);
const initials  = e => ((e.first_name||'?')[0] + (e.last_name||'?')[0]).toUpperCase();
const fullName  = e => (e.first_name||'') + ' ' + (e.last_name||'');
const hrs = (i,o) => {
  const [ih,im] = i.split(':').map(Number);
  const [oh,om] = o.split(':').map(Number);
  return ((oh*60+om - ih*60-im)/60).toFixed(2);
};

function certBadge(days){
  if(days < 0)  return {cls:'badge-red',   label:'Expired'};
  if(days <= 14) return {cls:'badge-red',   label: days+'d left'};
  if(days <= 60) return {cls:'badge-amber', label: days+'d left'};
  return {cls:'badge-green', label:'Valid'};
}
function certBarColor(days){
  if(days <= 0)  return '#ef4444';
  if(days <= 30) return '#ef4444';
  if(days <= 60) return '#f59e0b';
  return '#10b981';
}

// ── AUTH ───────────────────────────────────────────────────────
function setLoginRole(r){
  loginRole = r;
  document.querySelectorAll('.login-tab').forEach((t,i) =>
    t.classList.toggle('active', i === (r==='employee'?0:1)));
}

async function doLogin(){
  const email = $('loginEmail').value.trim();
  const pass  = $('loginPass').value.trim();
  if(!email || !pass){ $('loginError').textContent = 'Enter email and password.'; return; }

  const btn = $('loginBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  $('loginError').textContent = '';

  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  btn.innerHTML = 'Sign In →';
  btn.disabled = false;

  if(error){ $('loginError').textContent = error.message; return; }

  // Try to load matching employee record
  const { data: emp } = await db.from('employees')
    .select('*').eq('email', email).maybeSingle();

  currentUser = data.user;
  currentEmp  = emp;
  currentRole = loginRole;

  $('loginScreen').style.display = 'none';
  $('appShell').style.display = 'flex';
  await initApp();
}

async function doSignOut(){
  if(!confirm('Sign out?')) return;
  stopGPS();
  if(clockTimer) clearInterval(clockTimer);
  await db.auth.signOut();
  location.reload();
}

// ── APP INIT ───────────────────────────────────────────────────
async function initApp(){
  $('rolePill').textContent = currentRole==='admin' ? '🏢 Admin' : '👷 Employee';
  $('topBarSub').textContent = currentRole==='admin' ? 'Admin Dashboard' : 'Field App';

  allEmployees = await loadEmployees();

  const certs = await loadCerts();
  const expiring = certs.filter(c => daysUntil(c.expiry_date) <= 60);
  $('notifDot').style.display = expiring.length > 0 ? 'block' : 'none';

  if(currentRole === 'admin') buildAdminNav();
  else buildEmployeeNav();

  showSection('home');
}

function switchRole(){
  currentRole = currentRole === 'employee' ? 'admin' : 'employee';
  activeChat = null;
  initApp();
}

// ── NAV ────────────────────────────────────────────────────────
function buildEmployeeNav(){
  $('bottomNav').innerHTML = `
    <button class="nav-item active" data-sec="home"    onclick="showSection('home')">   <span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item"        data-sec="gps"     onclick="showSection('gps')">    <span class="nav-icon">📍</span><span class="nav-label">My Trail</span></button>
    <button class="nav-item"        data-sec="mycerts" onclick="showSection('mycerts')"><span class="nav-icon">📋</span><span class="nav-label">My Certs</span></button>
    <button class="nav-item"        data-sec="chat"    onclick="showSection('chat')">   <span class="nav-icon">💬</span><span class="nav-label">Chat</span></button>
    <button class="nav-item"        data-sec="alerts"  onclick="showSection('alerts')"> <span class="nav-icon">🔔</span><span class="nav-label">Alerts</span></button>`;
}
function buildAdminNav(){
  $('bottomNav').innerHTML = `
    <button class="nav-item active" data-sec="home"       onclick="showSection('home')">      <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></button>
    <button class="nav-item"        data-sec="team"       onclick="showSection('team')">      <span class="nav-icon">👥</span><span class="nav-label">Team</span></button>
    <button class="nav-item"        data-sec="timesheets" onclick="showSection('timesheets')"><span class="nav-icon">⏰</span><span class="nav-label">Time</span></button>
    <button class="nav-item"        data-sec="chat"       onclick="showSection('chat')">      <span class="nav-icon">💬</span><span class="nav-label">Chat</span></button>
    <button class="nav-item"        data-sec="reports"    onclick="showSection('reports')">   <span class="nav-icon">📁</span><span class="nav-label">Reports</span></button>`;
}

function showSection(sec){
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.sec === sec));
  $('mainContent').innerHTML = '<div class="loading">Loading…</div>';
  if(currentRole === 'employee') renderEmployee(sec);
  else renderAdmin(sec);
}

// ── DB HELPERS ─────────────────────────────────────────────────
async function loadEmployees(){
  const { data } = await db.from('employees').select('*').order('last_name');
  return data || [];
}
async function loadCerts(empId=null){
  let q = db.from('certifications').select('*').order('expiry_date');
  if(empId) q = q.eq('employee_id', empId);
  const { data } = await q;
  return data || [];
}
async function loadTimeEntries(){
  const { data } = await db.from('time_entries')
    .select('*, employees(first_name, last_name, hourly_rate, department, position)')
    .order('date', {ascending:false}).limit(50);
  return data || [];
}
async function loadAnnouncements(){
  const { data } = await db.from('announcements').select('*').order('created_at',{ascending:false});
  return data || [];
}
async function loadMessages(otherId){
  const myId = currentEmp?.id;
  if(!myId) return [];
  const { data } = await db.from('messages').select('*')
    .or(`and(sender_id.eq.${myId},recipient_id.eq.${otherId}),and(sender_id.eq.${otherId},recipient_id.eq.${myId})`)
    .order('created_at');

}

function startClock(){
  if(clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(()=>{
    const el = $('liveClock');
    if(el) el.textContent = fmtTime(new Date());
  }, 1000);
}

async function toggleClock(){
  if(!currentEmp){ alert('Employee record not found. Contact your admin.'); return; }
  if(!isClockedIn){
    // Clock IN
    const now = new Date();
    const { data, error } = await db.from('time_entries').insert([{
      employee_id: currentEmp.id,
      date: now.toISOString().split('T')[0],
      clock_in: now.toTimeString().slice(0,5),
      status: 'Pending'
    }]).select().single();
    if(error){ alert('Clock-in failed: ' + error.message); return; }
    activeTimeEntryId = data.id;
    isClockedIn = true;
    clockInTime = now;
    startGPS();
    await renderEmpHome();
  } else {
    // Clock OUT
    const now = new Date();
    const out  = now.toTimeString().slice(0,5);
    const h    = ((now - clockInTime)/3600000).toFixed(2);
    const { error } = await db.from('time_entries').update({
      clock_out: out, total_hours: h, status: 'Pending'
    }).eq('id', activeTimeEntryId);
    if(error){ alert('Clock-out failed: ' + error.message); return; }
    stopGPS();
    isClockedIn = false;
    clockInTime = null;
    activeTimeEntryId = null;
    alert(`⏹ Clocked out.\nHours: ${h}\nGPS pings saved: ${gpsTrail.length}`);
    gpsTrail = [];
    await renderEmpHome();
  }
}

function startGPS(){
  const logPing = () => {
    const save = async (lat, lng) => {
      gpsTrail.push({time: fmtTime(new Date()), lat, lng});
      if(activeTimeEntryId){
        await db.from('gps_pings').insert([{
          employee_id:   currentEmp.id,
          time_entry_id: activeTimeEntryId,
          pinged_at:     new Date().toISOString(),
          latitude:      parseFloat(lat),
          longitude:     parseFloat(lng)
        }]);
      }
    };
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos => save(pos.coords.latitude.toFixed(5), pos.coords.longitude.toFixed(5)),
        ()  => {
          const last = gpsTrail[gpsTrail.length-1] || {lat:47.1532, lng:-122.4783};
          save((parseFloat(last.lat)+(Math.random()-0.5)*0.003).toFixed(5),
               (parseFloat(last.lng)+(Math.random()-0.5)*0.003).toFixed(5));
        }, {enableHighAccuracy:true, timeout:8000}
      );
    }
  };
  logPing();
  gpsInterval = setInterval(logPing, 10 * 60 * 1000);
}
function stopGPS(){
  if(gpsInterval) clearInterval(gpsInterval);
  gpsInterval = null;
}

          return `<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};">

async function sendMsg(otherId){
  if(!currentEmp){ alert('Employee record needed to send messages.'); return; }
  const input = $('chatInput');
  const txt = input.value.trim();
  if(!txt) return;
  input.value = '';
  const { error } = await db.from('messages').insert([{
    sender_id: currentEmp.id, recipient_id: otherId, body: txt, read: false
  }]);
  if(error){ alert('Send failed: '+error.message); return; }
  await renderChatThread(otherId);
}

async function submitEmp(){

// ── CSV EXPORT ─────────────────────────────────────────────────
async function downloadCSV(type){
  let cols=[], rows=[];
  if(type==='timesheet'){
    const entries = await loadTimeEntries();
    cols = ['Employee ID','Name','Dept','Position','Rate','Date','Clock In','Clock Out','Hours','Gross Pay','Status'];
    rows = entries.map(t=>{
      const n = (t.employees?.first_name||'')+' '+(t.employees?.last_name||'');
      const h = t.total_hours || (t.clock_out?hrs(t.clock_in,t.clock_out):'0');
      return [t.employee_id,n,t.employees?.department,t.employees?.position,
              '$'+(t.employees?.hourly_rate||0),t.date,t.clock_in,t.clock_out||'--',
              h,'$'+((h*(t.employees?.hourly_rate||0))).toFixed(2),t.status];
    });
  } else if(type==='gps'){
    const { data } = await db.from('gps_pings')
      .select('*, employees(first_name,last_name)').order('pinged_at');
    cols = ['Employee ID','Name','Timestamp','Latitude','Longitude'];
    rows = (data||[]).map(p=>[p.employee_id,(p.employees?.first_name||'')+' '+(p.employees?.last_name||''),p.pinged_at,p.latitude,p.longitude]);
  } else if(type==='certs'){
    const certs = await loadCerts();
    cols = ['Employee ID','Name','Certification','Issuing Body','Issue Date','Expiry Date','Days Left'];
    const empMap = Object.fromEntries(allEmployees.map(e=>[e.id,e]));
    rows = certs.map(c=>{
      const e=empMap[c.employee_id]||{};
      const days=daysUntil(c.expiry_date);
      return [c.employee_id,fullName(e),c.name,c.issuing_body,c.issued_date,c.expiry_date,days<0?'EXPIRED':days];
    });
  } else {
    cols = ['ID','First','Last','Email','Department','Position','Hourly Rate','Status'];
    rows = allEmployees.map(e=>[e.id,e.first_name,e.last_name,e.email,e.department,e.position,e.hourly_rate,e.status]);
  }
  const csv=[cols.join(','),...rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`oktc_${type}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ── GPS MAP DRAW ───────────────────────────────────────────────
function genDemoTrail(){
  const trail=[]; let lat=47.1532, lng=-122.4783;
  for(let i=0;i<8;i++){
    lat+=(Math.sin(i*1.3)*0.003); lng+=(Math.cos(i*1.3)*0.003);
    trail.push({time:`0${7+Math.floor(i*10/60)}:${String((i*10)%60).padStart(2,'0')}`,lat:lat.toFixed(5),lng:lng.toFixed(5)});
  }
  return trail;
}

function drawTrail(mapId, trail){
  const map=$(mapId); if(!map||trail.length===0) return;
  [...map.querySelectorAll('.trail-dot,.trail-line')].forEach(el=>el.remove());
  const W=map.clientWidth, H=map.clientHeight, pad=24;
  const lats=trail.map(p=>parseFloat(p.lat)), lngs=trail.map(p=>parseFloat(p.lng));
  const minLat=Math.min(...lats), maxLat=Math.max(...lats);
  const minLng=Math.min(...lngs), maxLng=Math.max(...lngs);
  const xy=(lat,lng)=>({
    x: pad+(lng-minLng)/(maxLng-minLng||0.001)*(W-pad*2),
    y: H-pad-(lat-minLat)/(maxLat-minLat||0.001)*(H-pad*2)
  });
  trail.forEach((p,i)=>{
    const {x,y}=xy(parseFloat(p.lat),parseFloat(p.lng));
    if(i<trail.length-1){
      const n=xy(parseFloat(trail[i+1].lat),parseFloat(trail[i+1].lng));
      const dx=n.x-x, dy=n.y-y, len=Math.sqrt(dx*dx+dy*dy), ang=Math.atan2(dy,dx)*180/Math.PI;
      const line=document.createElement('div');
      line.className='trail-line';
      line.style.cssText=`left:${x}px;top:${y}px;width:${len}px;transform:rotate(${ang}deg);`;
      map.appendChild(line);
    }
    const dot=document.createElement('div');
    dot.className='trail-dot'+(i===trail.length-1?' current':'');
    dot.style.cssText=`left:${x}px;top:${y}px;`;
    dot.title=p.time;
    map.appendChild(dot);
  });
}
